<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Varatharajan K — AI Founder & Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { bebas: ['Bebas Neue', 'sans-serif'], syne: ['Syne', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], sans: ['Manrope', 'sans-serif'] },
                    colors: { bg: '#030308', surface: '#0a0a12', accent: '#00ff88', accent2: '#00d4ff', muted: '#3a3a52', muted2: '#5a5a7a' },
                    screens: { xs: '480px' },
                    animation: {
                        'pulse-glow': 'pulseGlow 2.5s ease-in-out infinite',
                        'float': 'float 7s ease-in-out infinite',
                        'blink': 'blink 1s step-end infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'marquee': 'marquee 20s linear infinite',
                    },
                    keyframes: {
                        pulseGlow: { '0%,100%': { boxShadow: '0 0 6px #00ff88,0 0 12px rgba(0,255,136,0.2)' }, '50%': { boxShadow: '0 0 20px #00ff88,0 0 40px rgba(0,255,136,0.4)' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-14px)' } },
                        blink: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0' } },
                        marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
                    }
                }
            }
        }
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background: #030308;
            color: #e8e8f0;
            overflow-x: hidden;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: #030308;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#00ff88, #00d4ff);
            border-radius: 2px;
        }

        /* CUSTOM CURSOR */
        #cur-dot {
            position: fixed;
            width: 7px;
            height: 7px;
            background: #00ff88;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width .15s, height .15s, background .15s;
        }

        #cur-ring {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(0, 255, 136, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width .25s, height .25s, opacity .25s, border-color .25s;
            opacity: .4;
        }

        body.hov #cur-dot {
            width: 12px;
            height: 12px;
            background: #00ffaa;
        }

        body.hov #cur-ring {
            width: 48px;
            height: 48px;
            opacity: .7;
            border-color: #00ff88;
        }

        @media(max-width:768px) {

            #cur-dot,
            #cur-ring {
                display: none;
            }

            body {
                cursor: auto;
            }
        }

        /* PROGRESS BAR */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            z-index: 700;
            transform-origin: left;
            transform: scaleX(0);
        }

        /* SCROLL REVEAL */
        .reveal {
            opacity: 0;
            transform: translateY(36px);
            transition: opacity .75s cubic-bezier(.16, 1, .3, 1), transform .75s cubic-bezier(.16, 1, .3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity .75s cubic-bezier(.16, 1, .3, 1), transform .75s cubic-bezier(.16, 1, .3, 1);
        }

        .reveal-left.visible {
            opacity: 1;
            transform: none;
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(40px);
            transition: opacity .75s cubic-bezier(.16, 1, .3, 1), transform .75s cubic-bezier(.16, 1, .3, 1);
        }

        .reveal-right.visible {
            opacity: 1;
            transform: none;
        }

        .reveal-scale {
            opacity: 0;
            transform: scale(.94);
            transition: opacity .7s cubic-bezier(.16, 1, .3, 1), transform .7s cubic-bezier(.16, 1, .3, 1);
        }

        .reveal-scale.visible {
            opacity: 1;
            transform: none;
        }

        .reveal-delay-1 {
            transition-delay: .1s;
        }

        .reveal-delay-2 {
            transition-delay: .2s;
        }

        .reveal-delay-3 {
            transition-delay: .3s;
        }

        .reveal-delay-4 {
            transition-delay: .4s;
        }

        .reveal-delay-5 {
            transition-delay: .5s;
        }

        /* NAV */
        .nav-blur {
            background: rgba(3, 3, 8, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link::after {
            content: '';
            display: block;
            height: 1px;
            background: #00ff88;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .25s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            transform: scaleX(1);
        }

        /* HERO */
        .hero-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        .gradient-text {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* PHOTO */
        .photo-ring {
            position: relative;
        }

        .photo-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #00d4ff, #7c3aed);
            z-index: 0;
            animation: spin-slow 12s linear infinite;
        }

        .photo-inner {
            position: relative;
            z-index: 1;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #030308;
        }

        .photo-zone-mobile {
            border: 2px dashed rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            transition: border-color .3s, background .3s;
            cursor: pointer;
        }

        .photo-zone-mobile:hover {
            border-color: rgba(0, 255, 136, 0.7);
            background: rgba(0, 255, 136, 0.04);
        }

        /* SKILLS */
        .skill-card {
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            transition: border-color .35s, transform .35s, box-shadow .35s;
            background: #0a0a12;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 0;
            background: linear-gradient(#00ff88, #00d4ff);
            transition: height .4s;
        }

        .skill-card:hover::before {
            height: 100%;
        }

        .skill-card:hover {
            border-color: rgba(0, 255, 136, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .6);
        }

        /* PROJECT CARDS */
        .proj-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            background: linear-gradient(145deg, #0d0d18, #080810);
            transition: all .45s cubic-bezier(.23, 1, .32, 1);
        }

        .proj-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%), rgba(0, 255, 136, 0.07), transparent 40%);
            opacity: 0;
            transition: opacity .35s;
        }

        .proj-card:hover::before {
            opacity: 1;
        }

        .proj-card:hover {
            border-color: rgba(0, 255, 136, 0.25);
            transform: translateY(-8px);
            box-shadow: 0 32px 70px rgba(0, 0, 0, .8), 0 0 0 1px rgba(0, 255, 136, 0.1), 0 0 40px rgba(0, 255, 136, 0.04);
        }

        .proj-card-clickable {
            cursor: pointer;
        }

        .proj-vis {
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #06060e;
        }

        .proj-vis svg {
            transition: transform .6s cubic-bezier(.23, 1, .32, 1);
            width: 100%;
            height: 100%;
        }

        .proj-card:hover .proj-vis svg {
            transform: scale(1.05);
        }

        .proj-vis-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 30%, #080810 100%);
            pointer-events: none;
        }

        /* BACK TO TOP FAB */
        #back-top-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(10, 10, 20, 0.85);
            border: 1px solid rgba(0, 255, 136, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 500;
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s, transform .3s, box-shadow .3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #back-top-fab.show {
            opacity: 1;
            pointer-events: auto;
        }

        #back-top-fab:hover {
            border-color: rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.25);
            transform: translateY(-3px);
        }

        /* COPY EMAIL TOAST */
        #copy-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(0, 255, 136, 0.12);
            border: 1px solid rgba(0, 255, 136, 0.35);
            color: #00ff88;
            font-family: 'JetBrains Mono', monospace;
            font-size: .72rem;
            letter-spacing: .08em;
            padding: 10px 22px;
            border-radius: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s, transform .3s;
            z-index: 600;
            backdrop-filter: blur(12px);
        }

        #copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* TAGS */
        .proj-tag {
            background: rgba(0, 255, 136, 0.07);
            border: 1px solid rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border-radius: 5px;
            font-size: .65rem;
            letter-spacing: .07em;
            padding: 3px 10px;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }

        .proj-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(0, 255, 136, 0.28);
            color: #00ff88;
            background: rgba(0, 255, 136, 0.07);
            border-radius: 7px;
            padding: 9px 18px;
            font-size: .72rem;
            letter-spacing: .08em;
            text-decoration: none;
            transition: all .25s;
            font-family: 'JetBrains Mono', monospace;
        }

        .proj-link-btn:hover {
            background: rgba(0, 255, 136, 0.16);
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.25);
            transform: translateY(-2px);
        }

        /* ACHIEVEMENTS */
        .ach-card {
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            background: #0a0a12;
            position: relative;
            overflow: hidden;
            transition: border-color .35s, transform .35s, box-shadow .35s;
        }

        .ach-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .5s;
        }

        .ach-card:hover::after {
            transform: scaleX(1);
        }

        .ach-card:hover {
            border-color: rgba(0, 255, 136, 0.18);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .6);
        }

        /* FLOATING SOCIAL */
        .social-float {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(12px);
            transition: all .25s;
            cursor: pointer;
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: rgba(0, 255, 136, 0.45);
            background: rgba(0, 255, 136, 0.09);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.22);
        }

        @media(max-width:1024px) {
            .social-float {
                display: none;
            }
        }

        /* CONTACT INPUTS */
        .c-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e8e8f0;
            font-family: 'Manrope', sans-serif;
            font-size: .9rem;
            padding: 14px 16px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            transition: border-color .25s, box-shadow .25s;
        }

        .c-input:focus {
            border-color: rgba(0, 255, 136, 0.35);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.07);
        }

        .c-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* CONTACT LINKS */
        .c-link {
            transition: padding-left .25s, color .25s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .c-link:hover {
            padding-left: 10px;
            color: #00ff88;
        }

        /* SECTION LABEL */
        .sec-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sec-line {
            width: 40px;
            height: 1px;
            background: #00ff88;
            opacity: .5;
        }

        /* MARQUEE */
        .marquee-track {
            display: flex;
            white-space: nowrap;
            animation: marquee 22s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        /* BADGE */
        .badge {
            border: 1px solid rgba(0, 255, 136, 0.2);
            background: rgba(0, 255, 136, 0.06);
            border-radius: 9999px;
        }

        /* ANIMATIONS */
        @keyframes dashMove {
            to {
                stroke-dashoffset: -16;
            }
        }

        .dash-anim {
            stroke-dasharray: 4 4;
            animation: dashMove 2s linear infinite;
        }

        @keyframes pingRipple {
            0% {
                transform: scale(1);
                opacity: .6
            }

            75%,
            100% {
                transform: scale(2);
                opacity: 0
            }
        }

        .ping-ripple {
            animation: pingRipple 2s cubic-bezier(0, 0, .2, 1) infinite;
        }

        /* CTA BUTTON */
        .cta-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #00ff88;
            color: #030308;
            font-family: 'JetBrains Mono', monospace;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all .25s;
        }

        .cta-primary:hover {
            background: #00ffaa;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.45);
            transform: translateY(-2px);
        }

        .cta-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #9090b0;
            font-family: 'JetBrains Mono', monospace;
            font-size: .78rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all .25s;
        }

        .cta-secondary:hover {
            border-color: rgba(0, 255, 136, 0.35);
            color: #00ff88;
        }

        /* MOBILE NAV */
        .mob-menu {
            position: fixed;
            inset: 0;
            background: rgba(3, 3, 8, 0.97);
            backdrop-filter: blur(24px);
            z-index: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            transform: translateX(100%);
            transition: transform .35s cubic-bezier(.23, 1, .32, 1);
        }

        .mob-menu.open {
            transform: translateX(0);
        }

        @media(max-width:640px) {
            .hero-name {
                font-size: clamp(3rem, 13vw, 5rem) !important;
            }
        }

        /* ── PREMIUM HERO REDESIGN ────────────────────────────────────────────── */

        /* Cursor glow — page-wide, always on top of content but below cursor dot/ring */
        #cursor-glow {
            position: fixed;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9990;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 255, 136, 0.10) 0%, rgba(0, 212, 255, 0.04) 40%, transparent 70%);
            filter: blur(18px);
            opacity: 0;
            transition: opacity 0.4s ease, width 0.3s ease, height 0.3s ease;
            will-change: left, top, opacity;
        }

        #cursor-glow.active {
            opacity: 1;
        }

        #cursor-glow.hovered {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.16) 0%, rgba(0, 212, 255, 0.06) 40%, transparent 70%);
        }

        @media(max-width:768px) {
            #cursor-glow {
                display: none;
            }
        }

        /* Hero section premium base */
        .hero-premium {
            position: relative;
            min-height: 100svh;
            display: flex;
            align-items: center;
            padding-top: 5rem;
            padding-bottom: 3rem;
            overflow: hidden;
            background: linear-gradient(160deg, #030308 0%, #060610 55%, #03030a 100%);
        }

        /* Subtle noise texture overlay */
        .hero-premium::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
            pointer-events: none;
            opacity: 0.6;
            z-index: 0;
        }

        /* Hero grid lines */
        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient orbs (premium, more diffuse) */
        .hero-ambient {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Name glow — hover only */
        .hero-name-glow {
            display: inline-block;
            cursor: default;
            transition: color 0.35s ease, filter 0.35s ease, transform 0.35s ease;
            will-change: filter;
        }

        .hero-name-glow:hover {
            color: #00ff88;
            filter: drop-shadow(0 0 18px rgba(0, 255, 136, 0.65)) drop-shadow(0 0 40px rgba(0, 255, 136, 0.25));
            transform: translateY(-2px);
        }

        .hero-name-glow:active {
            transform: scale(0.97);
            filter: brightness(1.15) drop-shadow(0 0 12px rgba(0, 255, 136, 0.5));
        }

        /* Subtitle glow — hover only */
        .hero-subtitle-glow {
            display: inline;
            transition: color 0.3s ease, filter 0.3s ease;
        }

        .hero-subtitle-glow:hover {
            color: #00d4ff;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
        }

        /* Photo tilt container */
        .photo-tilt-container {
            perspective: 800px;
            cursor: default;
        }

        .photo-tilt-inner {
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Premium photo frame */
        .photo-frame-premium {
            position: relative;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.6) 0%, rgba(0, 212, 255, 0.4) 40%, rgba(124, 58, 237, 0.5) 100%);
            box-shadow:
                0 0 0 1px rgba(0, 255, 136, 0.08),
                0 32px 80px rgba(0, 0, 0, 0.7),
                0 8px 32px rgba(0, 255, 136, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);

        /* ─── HOOKS ─────────────────────────────────────────────────────────── */
        function useCursor() {
            useEffect(() => {
                const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window);
                if (isMobile) { document.body.style.cursor = 'auto'; return; }

                const dot = document.getElementById('cur-dot');
                const ring = document.getElementById('cur-ring');
                const glow = document.getElementById('cursor-glow');
                if (!dot || !ring || !glow) return;

                let mx = window.innerWidth / 2, my = window.innerHeight / 2;
                let rx = mx, ry = my;
                let rafId = null;
                let entered = false;

                const onMove = e => {
                    mx = e.clientX;
                    my = e.clientY;
                    // Snap dot immediately
                    dot.style.left = mx + 'px';
                    dot.style.top = my + 'px';
                    // Snap glow position (smoothed by rAF)
                    if (!entered) { entered = true; glow.classList.add('active'); }
                };

                const tick = () => {
                    // Smooth-follow ring
                    rx += (mx - rx) * 0.10;
                    ry += (my - ry) * 0.10;
                    ring.style.left = rx + 'px';
                    ring.style.top = ry + 'px';
                    // Glow follows mouse directly (CSS handles the visual softness via blur)
                    glow.style.left = mx + 'px';
                    glow.style.top = my + 'px';
                    rafId = requestAnimationFrame(tick);
                };

                // Hover-expansion for interactive elements
                const hoverOn = () => {
                    document.body.classList.add('hov');
                    glow.classList.add('hovered');
                };
                const hoverOff = () => {
                    document.body.classList.remove('hov');
                    glow.classList.remove('hovered');
                };

                const attachHover = () => {
                    document.querySelectorAll('a, button, [data-hover], input, textarea, label').forEach(el => {
                        el.addEventListener('mouseenter', hoverOn);
                        el.addEventListener('mouseleave', hoverOff);
                    });
                };

                document.addEventListener('mousemove', onMove, { passive: true });
                rafId = requestAnimationFrame(tick);
                // Attach once DOM is ready, re-attach after a tick so React-rendered elements exist
                attachHover();
                const reattachTimeout = setTimeout(attachHover, 500);

                return () => {
                    document.removeEventListener('mousemove', onMove);
                    cancelAnimationFrame(rafId);
                    clearTimeout(reattachTimeout);
                    document.body.classList.remove('hov');
                    glow.classList.remove('active', 'hovered');
                };
            }, []);
        }

            const [text, setText] = useState('');

            }, [text, del, wi]);
            return text;

            const [val, setVal] = useState(0);

                        obs.disconnect();
                    }
                }, { threshold: 0.5 });
                obs.observe(el);
                return () => obs.disconnect();
            }, [to]);
            return [val, ref];

        /* ─── PARTICLE CANVAS ───────────────────────────────────────────────── */
        function ParticleCanvas() {
            const ref = useRef();
            useEffect(() => {
                const cv = ref.current, ctx = cv.getContext('2d');
                let W, H, pts = [], raf;
                const rs = () => { W = cv.width = cv.offsetWidth; H = cv.height = cv.offsetHeight; };
                const init = () => {
                    pts = [];
                    const n = Math.min(Math.floor(W * H / 12000), 80);
                    for (let i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .22, vy: (Math.random() - .5) * .22, r: Math.random() * 1.3 + .3 });
                };
                const draw = () => {
                    ctx.clearRect(0, 0, W, H);
                    pts.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > W) p.vx *= -1;
                        if (p.y < 0 || p.y > H) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0,255,136,0.5)'; ctx.fill();
                        for (let j = i + 1; j < pts.length; j++) {
                            const q = pts[j], dx = p.x - q.x, dy = p.y - q.y, d = Math.sqrt(dx * dx + dy * dy);
                            if (d < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(0,255,136,${.13 * (1 - d / 120)})`; ctx.lineWidth = .5; ctx.stroke(); }
                        }
                    });
                    raf = requestAnimationFrame(draw);
                };
                rs(); init(); draw();
                const ro = new ResizeObserver(() => { rs(); init(); }); ro.observe(cv);
                return () => { cancelAnimationFrame(raf); ro.disconnect(); };
            }, []);
            return <canvas ref={ref} className="absolute inset-0 w-full h-full pointer-events-none opacity-40" />;
        }

        function PhotoTilt({ photo, setPhoto }) {
            const ref = useRef();
            const fileRef = useRef();
            const handle = e => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = ev => setPhoto(ev.target.result); r.readAsDataURL(f);
            };
            const onMove = e => {
                if (!ref.current) return;
                const rect = ref.current.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = (e.clientX - cx) / (rect.width / 2);
                const dy = (e.clientY - cy) / (rect.height / 2);
                ref.current.style.transform = `rotateY(${dx * 8}deg) rotateX(${-dy * 8}deg) scale(1.03)`;
            };
            const onLeave = () => {
                if (!ref.current) return;
                ref.current.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
            };

            return (
                <div className="photo-tilt-container" onMouseMove={onMove} onMouseLeave={onLeave}>
                    <div ref={ref} className="photo-tilt-inner" style={{ display: 'inline-block' }}>
                        <div style={{ position: 'relative', display: 'inline-block' }}>

        /* ─── PROJECT CARD ───────────────────────────────────────────────────── */
        function ProjectCard({ p, index }) {
            const ref = useRef();
            const Illu = ILLUS[index];
            const onMM = e => {
                const r = ref.current.getBoundingClientRect();
                ref.current.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
                ref.current.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
            };
            const handleCardClick = e => {
                // Only navigate if the click wasn't on a button/link inside the card
                if (e.target.closest('a,button')) return;
                if (p.link) window.open(p.link, '_blank', 'noopener');
            };
            return (
                <div
                    ref={ref}
                    className={`proj-card reveal${p.link ? ' proj-card-clickable' : ''}`}
                    onMouseMove={onMM}
                    onClick={handleCardClick}
                    style={{ '--color': p.color }}
                    title={p.link ? `Open ${p.title} →` : ''}
                >
                    {/* Illustration */}
                    <div className="proj-vis" style={{ height: 210 }}>
                        {Illu && <Illu />}
                        <div className="proj-vis-overlay" />
                        <div className="absolute top-4 left-4 font-mono text-xs tracking-widest px-3 py-1 rounded-full" style={{ background: 'rgba(0,0,0,0.6)', border: '1px solid rgba(255,255,255,0.07)', color: '#3a3a52' }}>
                            {p.num} · {p.year}
                        </div>
                        {p.link && (
                            <div className="absolute top-4 right-4 flex items-center gap-1.5 px-3 py-1 rounded-full" style={{ background: 'rgba(0,255,136,0.1)', border: '1px solid rgba(0,255,136,0.28)' }}>
                                <span className="w-1.5 h-1.5 rounded-full bg-accent ping-ripple" />
                                <span className="font-mono text-xs" style={{ color: '#00ff88' }}>LIVE</span>
                            </div>
                        )}
                        {/* Click-to-visit overlay hint */}
                        {p.link && (
                            <div className="proj-vis-overlay" style={{ background: 'linear-gradient(to bottom,transparent 40%,rgba(0,255,136,0.04) 100%)' }} />
                        )}
                    </div>

                    {/* Content */}
                    <div style={{ padding: '1.6rem 1.8rem 1.8rem' }}>
                        <div style={{ width: 32, height: 2, background: p.color, borderRadius: 2, marginBottom: 14, opacity: .8 }} />
                        <div className="font-mono text-xs tracking-widest mb-1" style={{ color: p.color, opacity: .75 }}>{p.sub}</div>
                        <h3 className="font-syne font-extrabold text-lg mb-3" style={{ letterSpacing: '-.02em', lineHeight: 1.2, fontSize: 'clamp(1rem,2.5vw,1.2rem)' }}>{p.title}</h3>
                        <p className="font-sans text-sm mb-4 leading-7" style={{ color: '#5a5a7a', fontSize: '.9rem' }}>{p.desc}</p>
                        <div className="flex flex-col gap-1.5 mb-5">
                            {p.bullets.map((b, j) => (
                                <div key={j} className="flex items-start gap-2 font-sans text-sm" style={{ color: '#5a5a7a', fontSize: '.85rem' }}>
                                    <span className="mt-1.5 font-mono flex-shrink-0" style={{ color: p.color, fontSize: '.55rem' }}>●</span>{b}
                                </div>
                            ))}
                        </div>
                        <div className="flex flex-wrap gap-1.5 mb-5">{p.stack.map(s => <span key={s} className="proj-tag">{s}</span>)}</div>
                        <div className="flex gap-3 flex-wrap">
                            {p.link && (
                                <a href={p.link} target="_blank" rel="noopener" className="proj-link-btn" onClick={e => e.stopPropagation()}>
